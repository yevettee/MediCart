<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MediCart Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <!-- 상단: 현재 상태 문구와 로봇 운영 명령 버튼들 -->
      <header class="topbar">
        <div>
          <h1>MediCart Dashboard</h1>
          <p id="statusText">연결 중</p>
        </div>
        <nav class="command-bar" aria-label="Robot commands">
          <button data-command="dock" type="button">Dock</button>
          <button data-command="undock" type="button">Undock</button>
          <button data-command="ros_restart" type="button">ROS Restart</button>
          <button data-command="reboot" type="button">Reboot</button>
          <button data-command="shutdown" type="button">Shutdown</button>
        </nav>
      </header>

      <!-- 지도 영역: Python이 제공한 map 이미지와 target marker를 app.js가 그린다 -->
      <section class="map-card" aria-label="2D map">
        <div class="section-head">
          <strong>2D Map</strong>
          <span id="poseText">AMR pose waiting</span>
        </div>
        <div class="map-wrap" id="mapWrap">
          <div class="map-stage" id="mapStage">
            <img id="mapImage" alt="Scanned 2D map" />
            <div class="marker-layer" id="markerLayer"></div>
          </div>
        </div>
      </section>

      <!-- 카메라 영역: ROS CompressedImage topic을 dashboard_node.py가 SSE로 보내고 app.js가 표시한다 -->
      <section class="camera-card" aria-label="RGB-D view">
        <div class="section-head">
          <strong>RGB-D View</strong>
          <span id="cameraText">10fps sync waiting</span>
          <button
            class="capture-toggle"
            id="captureToggle"
            type="button"
            aria-pressed="false"
          >
            Capture OFF
          </button>
        </div>
        <div class="camera-grid">
          <figure>
            <figcaption>RGB</figcaption>
            <img id="rgbView" alt="AMR RGB stream" />
          </figure>
          <figure>
            <figcaption>Depth</figcaption>
            <img id="depthView" alt="AMR depth stream" />
          </figure>
        </div>
      </section>

      <!-- 로그 영역: ROS action 진행 상황과 에러를 SSE log 이벤트로 받아 누적 표시한다 -->
      <section class="log-card" aria-label="Realtime logs">
        <div class="section-head">
          <strong>Logs</strong>
          <button id="clearLogs" type="button">Clear</button>
        </div>
        <ol id="logList" class="log-list" aria-live="polite"></ol>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
